services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: globant-api
    ports:
      - "5001:5001"
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
      - ./backups:/app/backups
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
    networks:
      - globant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: globant-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
      - ./backups:/app/backups
    environment:
      - DATABASE_PATH=/app/database/challenge.db
    networks:
      - globant-network
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  globant-network:
    driver: bridge

