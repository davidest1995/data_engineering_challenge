services:
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge
    container_name: globant-sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Your_Password123!
    volumes:
      - ./database:/var/opt/mssql
    networks:
      - globant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-U", "sa", "-P", "Your_Password123!", "-Q", "SELECT 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: globant-api
    ports:
      - "5001:5001"
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
      - ./backups:/app/backups
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - DB_SERVER=sqlserver
      - DB_NAME=challenge
      - DB_USER=sa
      - DB_PASSWORD=Your_Password123!
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - globant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: globant-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
      - ./backups:/app/backups
    environment:
      - DB_SERVER=sqlserver
      - DB_NAME=challenge
      - DB_USER=sa
      - DB_PASSWORD=Your_Password123!
    networks:
      - globant-network
    depends_on:
      api:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

networks:
  globant-network:
    driver: bridge

